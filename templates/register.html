<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outly — Create Account</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f3f4f6; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; color: #111827; }
        .card { background: white; padding: 2.5rem 2rem; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); width: 100%; max-width: 400px; }
        .logo { font-size: 1.6rem; font-weight: 700; text-align: center; margin-bottom: 0.25rem; }
        .tagline { text-align: center; color: #6b7280; font-size: 0.88rem; margin-bottom: 2rem; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; font-weight: 500; font-size: 0.88rem; color: #374151; margin-bottom: 0.4rem; }
        input { width: 100%; padding: 0.6rem 0.75rem; border: 1px solid #d1d5db; border-radius: 6px; font-size: 0.95rem; transition: border-color 0.15s; }
        input:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        button { width: 100%; background: #2563eb; color: white; padding: 0.65rem; border: none; border-radius: 6px; font-weight: 600; font-size: 1rem; cursor: pointer; margin-top: 0.5rem; transition: background 0.15s; }
        button:hover { background: #1d4ed8; }
        .error { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; padding: 0.65rem 0.75rem; border-radius: 6px; font-size: 0.88rem; margin-bottom: 1rem; }
        .footer { text-align: center; margin-top: 1.25rem; font-size: 0.88rem; color: #6b7280; }
        .footer a { color: #2563eb; text-decoration: none; font-weight: 500; }
        .footer a:hover { text-decoration: underline; }
        .hint { font-size: 0.78rem; color: #9ca3af; margin-top: 0.25rem; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">🚀 Outly</div>
        <div class="tagline">Create your account to start prospecting</div>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/register">
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="you@company.com" value="{{ email or '' }}" autofocus required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="At least 8 characters" required minlength="8">
                <div class="hint">Min 8 characters</div>
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" name="confirm_password" placeholder="Repeat password" required>
            </div>
            <button type="submit">Create Account →</button>
        </form>

        <div class="footer">
            Already have an account? <a href="/login">Sign in</a>
        </div>
    </div>
</body>
</html>
