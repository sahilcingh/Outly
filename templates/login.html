<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outly — Sign In</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f3f4f6; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; color: #111827; }
        .card { background: white; padding: 2.5rem 2rem; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); width: 100%; max-width: 380px; }
        .logo { font-size: 1.6rem; font-weight: 700; text-align: center; margin-bottom: 0.25rem; }
        .tagline { text-align: center; color: #6b7280; font-size: 0.88rem; margin-bottom: 2rem; }
        label { display: block; font-weight: 500; font-size: 0.88rem; color: #374151; margin-bottom: 0.4rem; }
        input[type="password"] { width: 100%; padding: 0.6rem 0.75rem; border: 1px solid #d1d5db; border-radius: 6px; font-size: 0.95rem; transition: border-color 0.15s; }
        input[type="password"]:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        button { width: 100%; background: #2563eb; color: white; padding: 0.65rem; border: none; border-radius: 6px; font-weight: 600; font-size: 1rem; cursor: pointer; margin-top: 1rem; transition: background 0.15s; }
        button:hover { background: #1d4ed8; }
        .error { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; padding: 0.65rem 0.75rem; border-radius: 6px; font-size: 0.88rem; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">🚀 Outly</div>
        <div class="tagline">B2B Prospecting Agent — Sign in to continue</div>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/login">
            <input type="hidden" name="next" value="{{ next }}">
            <div style="margin-bottom:1rem;">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter access password" autofocus required>
            </div>
            <button type="submit">Sign In →</button>
        </form>
    </div>
</body>
</html>
